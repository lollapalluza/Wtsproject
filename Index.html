<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WTS Project</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      overflow: hidden;
      color: white;
      text-align: center;
    }

    /* Видео фон */
    video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
    }

    /* Контент */
    .container {
      position: relative;
      top: 50%;
      transform: translateY(-50%);
    }

    h1 {
      font-size: 32px;
      margin-bottom: 30px;
      letter-spacing: 2px;
    }

    .btn {
      display: block;
      width: 260px;
      margin: 15px auto;
      padding: 15px;
      border-radius: 15px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      color: white;
      text-decoration: none;
      font-size: 18px;
      transition: 0.3s;
    }

    .btn:hover {
      background: rgba(255,255,255,0.25);
    }
  </style>
</head>

<body>

  <!-- Видео фон -->
  <video autoplay muted loop playsinline>
    <source src="bg.mp4" type="video/mp4">
  </video>

  <!-- Контент -->
  <div class="container">
    <h1>WTS PROJECT</h1>

    <a class="btn" href="#">💬 Основной чат</a>
    <a class="btn" href="#">📢 News Channel</a>
    <a class="btn" href="#">🔒 Escrow Bot 0%</a>
    <a class="btn" href="#">📖 WTS FAQ</a>
  </div>

</body>
</html>
