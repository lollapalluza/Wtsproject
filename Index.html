<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WTS Project</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      color: white;
      text-align: center;

      /* КРАСИВЫЙ ФОН */
      background: linear-gradient(135deg, #0f0f0f, #1a1a1a, #000000);
      background-size: 400% 400%;
      animation: gradientMove 10s ease infinite;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      position: relative;
      top: 50%;
      transform: translateY(-50%);
    }

    h1 {
      font-size: 32px;
      margin-bottom: 30px;
      letter-spacing: 2px;
    }

    .btn {
      display: block;
      width: 260px;
      margin: 15px auto;
      padding: 15px;
      border-radius: 15px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      color: white;
      text-decoration: none;
      font-size: 18px;
      transition: 0.3s;
    }

    .btn:hover {
      background: rgba(255,255,255,0.2);
      transform: scale(1.03);
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>WTS PROJECT</h1>

    <a class="btn" href="#">💬 Основной чат</a>
    <a class="btn" href="#">📢 News Channel</a>
    <a class="btn" href="#">🔒 Escrow Bot 0%</a>
    <a class="btn" href="#">📖 WTS FAQ</a>
  </div>

</body>
</html>
