<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WTS Project</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      height: 100vh;
      color: white;
      text-align: center;

      background: radial-gradient(circle at 20% 30%, #1a1a2e, #000000 70%),
                  radial-gradient(circle at 80% 70%, #16213e, transparent 70%);
      background-color: #000;
    }

    .container {
      position: relative;
      top: 50%;
      transform: translateY(-50%);
    }

    h1 {
      font-size: 34px;
      margin-bottom: 40px;
      letter-spacing: 2px;
    }

    .btn {
      display: block;
      width: 270px;
      margin: 18px auto;
      padding: 16px;
      border-radius: 18px;

      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);

      color: white;
      text-decoration: none;
      font-size: 18px;

      transition: all 0.3s ease;
    }

    .btn:hover {
      background: rgba(255, 255, 255, 0.15);
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(255,255,255,0.2);
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>WTS PROJECT</h1>

    <a class="btn" href="https://t.me/wtslobbybot">💬 Основной чат</a>
    <a class="btn" href="https://t.me/wtsprj">📢 News Channel</a>
    <a class="btn" href="https://t.me/WTSGARANTEDBOT">🔒 Escrow Bot 0%</a>
    <a class="btn" href="https://t.me/wtsproject">📖 WTS FAQ</a>
  </div>

</body>
</html>
