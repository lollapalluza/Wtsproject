<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>WTS Project</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      color: white;
      overflow: hidden;
    }

    /* ВИДЕО ФОН */
    #bg-video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
    }

    /* КОНТЕНТ ПО ЦЕНТРУ */
    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      top: 30%;
    }

    .btn {
      display: block;
      margin: 10px auto;
      padding: 12px 20px;
      width: 220px;
      background: rgba(0,0,0,0.6);
      border-radius: 10px;
      color: white;
      text-decoration: none;
      font-size: 16px;
    }
  </style>
</head>

<body>

  <!-- ВИДЕО -->
  <video autoplay muted loop playsinline id="bg-video">
    <source src="bg.mp4" type="video/mp4">
  </video>

  <!-- КНОПКИ -->
  <div class="container">
    <h1>WTS PROJECT</h1>

    <a href="#" class="btn">Основной чат</a>
    <a href="#" class="btn">News Channel</a>
    <a href="#" class="btn">Escrow Bot 0%</a>
    <a href="#" class="btn">WTS FAQ</a>
  </div>

</body>
</html>
