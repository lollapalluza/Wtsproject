<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>WTS PROJECT</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      overflow: hidden;
      color: white;
    }

    /* ВИДЕО ФОН */
    #bg-video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
    }

    /* ТЕМНОЕ ЗАТЕМНЕНИЕ */
    .overlay {
      position: fixed;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      top: 0;
      left: 0;
      z-index: 0;
    }

    /* КОНТЕНТ */
    .container {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    h1 {
      margin-bottom: 20px;
      font-size: 32px;
    }

    .btn {
      width: 220px;
      margin: 10px;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: rgba(0,0,0,0.6);
      color: white;
      cursor: pointer;
      transition: 0.3s;
      font-size: 16px;
    }

    .btn:hover {
      background: rgba(255,255,255,0.2);
    }
  </style>
</head>

<body>

  <!-- ВИДЕО -->
  <video autoplay muted loop playsinline id="bg-video">
    <source src="bg.MP4" type="video/mp4">
  </video>

  <!-- затемнение -->
  <div class="overlay"></div>

  <!-- контент -->
  <div class="container">
    <h1>WTS PROJECT</h1>

    <button class="btn">💬 Основной чат</button>
    <button class="btn">📢 News Channel</button>
    <button class="btn">🔒 Escrow Bot 0%</button>
    <button class="btn">📖 WTS FAQ</button>
  </div>

</body>
</html>
